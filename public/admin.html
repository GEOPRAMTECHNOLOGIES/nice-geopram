<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:20px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border:1px solid #ddd}
  </style>
</head>
<body>
  <h1>Admin — Transactions</h1>
  <div>
    <button id="authBtn">Load Transactions (enter admin creds)</button>
  </div>
  <table id="txTable" style="margin-top:12px;display:none">
    <thead><tr><th>Time</th><th>User</th><th>Phone</th><th>Service</th><th>Amount</th><th>Status</th></tr></thead>
    <tbody></tbody>
  </table>

  <script>
    document.getElementById('authBtn').addEventListener('click', async ()=>{
      const email = prompt('Admin email');
      const pass = prompt('Admin password');
      if(!email||!pass) return;
      const basic = btoa(email+":"+pass);
      const res = await fetch('/api/admin/transactions',{headers:{'Authorization':'Basic '+basic}});
      if(!res.ok){ alert('Auth failed'); return; }
      const txs = await res.json();
      const tbody = document.querySelector('#txTable tbody'); tbody.innerHTML='';
      txs.forEach(t=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${new Date(t.timestamp).toLocaleString()}</td><td>${t.email||t.order?.name||''}</td><td>${t.phone||t.order?.phone||''}</td><td>${t.order?.service?.title||t.order?.service}</td><td>${t.amount}</td><td>${t.status}</td>`;
        tbody.appendChild(tr);
      });
      document.getElementById('txTable').style.display='table';
    });
  </script>
</body>
</html>
