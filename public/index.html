<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Services — Order</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:20px}
    .service{border:1px solid #ddd;padding:12px;margin-bottom:12px;display:flex}
    .service img{width:120px;height:80px;object-fit:cover;margin-right:12px}
    .toast{position:fixed;right:20px;bottom:20px;background:#222;color:#fff;padding:10px 14px;border-radius:6px;display:none}
    .btn{background:#0070f3;color:#fff;border:none;padding:8px 12px;border-radius:4px;cursor:pointer}
  </style>
</head>
<body>
  <h1>Available Services</h1>
  <div id="list"></div>
  <div id="orderModal" style="display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border:1px solid #ccc;z-index:30">
    <h3 id="svcTitle"></h3>
    <form id="orderForm">
      <input type="hidden" id="serviceId" />
      <div><label>Name</label><br><input id="name" required></div>
      <div><label>Email</label><br><input id="email" required></div>
      <div><label>Phone</label><br><input id="phone" required></div>
      <div style="margin-top:10px"><button class="btn" type="submit">Place Order & Simulate Payment</button>
      <button type="button" id="closeBtn">Cancel</button></div>
    </form>
  </div>
  <div id="toast" class="toast"></div>
  <script src="/app.js"></script>
</body>
</html>
